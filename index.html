<link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 512 512'%3E%3Crect width='512' height='512' rx='80' fill='%230a0f1a'/%3E%3Ctext x='50%25' y='54%25' dominant-baseline='middle' text-anchor='middle' font-size='320' font-family='sans-serif'%3E⛷%3C/text%3E%3C/svg%3E">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
:root {
  --bg-deep: #0a0f1a;
  --glass: rgba(255,255,255,0.03);
  --border: rgba(255,255,255,0.08);
  --border-strong: rgba(255,255,255,0.15);
  --snow: #f8fafc;
  --fog: #94a3b8;
  --fog-dim: #64748b;
  --blue: #60a5fa;
  --green: #34d399;
  --gold: #fbbf24;
  --grad-blue: linear-gradient(135deg, #60a5fa 0%, #a78bfa 100%);
  --grad-green: linear-gradient(135deg, #34d399 0%, #fbbf24 100%);
  --grad-gold: linear-gradient(135deg, #fbbf24 0%, #f59e0b 100%);
  --shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
  --glow-blue: 0 0 40px rgba(96,165,250,0.1);
}

* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent }

html { scroll-behavior:smooth }

body {
  font-family:'Plus Jakarta Sans',sans-serif;
  background:var(--bg-deep);
  color:var(--snow);
  min-height:100vh;
  padding-bottom:24px;
  background-image:
    radial-gradient(ellipse at 20% 20%,rgba(96,165,250,0.15) 0%,transparent 50%),
    radial-gradient(ellipse at 80% 80%,rgba(52,211,153,0.1) 0%,transparent 50%);
  background-attachment:fixed;
}

#dashboard { max-width:520px; margin:0 auto; padding:24px 18px 40px }

/* Header */
.header { text-align:center; padding:32px 0 36px }

.chip {
  display:inline-flex;
  align-items:center;
  gap:8px;
  background:var(--glass);
  border:1px solid var(--border);
  color:var(--blue);
  font-family:'JetBrains Mono',monospace;
  font-size:0.7rem;
  letter-spacing:0.12em;
  padding:8px 16px;
  border-radius:99px;
  margin-bottom:20px;
  text-transform:uppercase;
  backdrop-filter:blur(10px);
  box-shadow:var(--shadow);
}

.chip::before {
  content:'✦';
  color:var(--gold);
  animation:pulse 2s infinite;
}

@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.5} }

.header h1 {
  font-size:2.4rem;
  font-weight:800;
  line-height:1.15;
  margin-bottom:10px;
  letter-spacing:-0.02em;
  background:linear-gradient(135deg,#f8fafc 0%,#94a3b8 100%);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

.header h1 span {
  background:var(--grad-gold);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

.header p {
  color:var(--fog);
  font-size:0.85rem;
  font-family:'JetBrains Mono',monospace;
  letter-spacing:0.05em;
}

/* Section titles */
.section-title {
  font-size:0.7rem;
  letter-spacing:0.2em;
  text-transform:uppercase;
  color:var(--fog);
  font-family:'JetBrains Mono',monospace;
  margin:32px 0 14px;
  display:flex;
  align-items:center;
  gap:12px;
  font-weight:600;
}

.section-title::after {
  content:'';
  flex:1;
  height:1px;
  background:linear-gradient(90deg,var(--border),transparent);
}

.section-subtitle {
  font-size:0.75rem;
  color:var(--fog-dim);
  font-family:'JetBrains Mono',monospace;
  margin:-10px 0 16px;
  font-weight:500;
  font-style:italic;
}

/* Cards */
.card {
  background:var(--glass);
  border:1px solid var(--border);
  border-radius:24px;
  padding:24px;
  backdrop-filter:blur(20px);
  transition:all 0.3s ease;
}

.card:hover {
  border-color:var(--border-strong);
  transform:translateY(-2px);
  box-shadow:var(--glow-blue);
}

/* ── Sticky nav ── */
.sticky-nav {
  position:sticky;
  top:0;
  z-index:100;
  display:flex;
  justify-content:center;
  gap:6px;
  padding:10px 18px;
  background:rgba(10,15,26,0.85);
  backdrop-filter:blur(20px);
  border-bottom:1px solid var(--border);
  margin:0 -18px 24px;
}

.nav-btn {
  background:var(--glass);
  border:1px solid var(--border);
  color:var(--fog);
  font-family:'JetBrains Mono',monospace;
  font-size:0.65rem;
  font-weight:600;
  letter-spacing:0.08em;
  padding:7px 12px;
  border-radius:10px;
  cursor:pointer;
  transition:all 0.2s ease;
  display:flex;
  align-items:center;
  gap:5px;
  text-decoration:none;
  white-space:nowrap;
}

.nav-btn:hover {
  border-color:var(--border-strong);
  color:var(--snow);
  background:rgba(255,255,255,0.06);
}

.nav-btn.active {
  background:rgba(96,165,250,0.15);
  border-color:var(--blue);
  color:var(--blue);
}

/* ── Scroll reveal ── */
.reveal {
  opacity:0;
  transform:translateY(20px);
  transition:opacity 0.5s ease, transform 0.5s ease;
}

.reveal.visible {
  opacity:1;
  transform:translateY(0);
}

/* ── Add activity modal ── */
.fab {
  position:fixed;
  bottom:28px;
  right:28px;
  z-index:200;
  background:var(--grad-blue);
  border:none;
  border-radius:50%;
  width:56px;
  height:56px;
  font-size:1.4rem;
  cursor:pointer;
  box-shadow:0 8px 24px rgba(96,165,250,0.35);
  display:flex;
  align-items:center;
  justify-content:center;
  transition:all 0.25s ease;
}

.fab:hover {
  transform:scale(1.12) rotate(15deg);
  box-shadow:0 12px 32px rgba(96,165,250,0.5);
}

.modal-overlay {
  position:fixed;
  inset:0;
  z-index:300;
  background:rgba(0,0,0,0.7);
  backdrop-filter:blur(6px);
  display:flex;
  align-items:flex-end;
  justify-content:center;
  opacity:0;
  pointer-events:none;
  transition:opacity 0.25s ease;
}

.modal-overlay.open {
  opacity:1;
  pointer-events:all;
}

.modal-sheet {
  background:#111827;
  border:1px solid var(--border-strong);
  border-radius:28px 28px 0 0;
  padding:28px 24px 40px;
  width:100%;
  max-width:520px;
  transform:translateY(40px);
  transition:transform 0.3s cubic-bezier(0.23,1,0.32,1);
}

.modal-overlay.open .modal-sheet {
  transform:translateY(0);
}

.modal-handle {
  width:40px;
  height:4px;
  background:var(--border-strong);
  border-radius:2px;
  margin:0 auto 24px;
}

.modal-title {
  font-size:1.1rem;
  font-weight:800;
  margin-bottom:20px;
  display:flex;
  align-items:center;
  gap:10px;
}

.form-grid {
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:12px;
  margin-bottom:16px;
}

.form-full {
  grid-column:1/-1;
}

.form-group {
  display:flex;
  flex-direction:column;
  gap:6px;
}

.form-label {
  font-size:0.65rem;
  text-transform:uppercase;
  letter-spacing:0.12em;
  color:var(--fog);
  font-family:'JetBrains Mono',monospace;
  font-weight:600;
}

.form-input, .form-select {
  background:rgba(255,255,255,0.05);
  border:1px solid var(--border);
  border-radius:12px;
  color:var(--snow);
  font-family:'Plus Jakarta Sans',sans-serif;
  font-size:0.85rem;
  padding:10px 14px;
  outline:none;
  transition:border-color 0.2s;
  width:100%;
  appearance:none;
}

.form-input:focus, .form-select:focus {
  border-color:var(--blue);
  box-shadow:0 0 0 3px rgba(96,165,250,0.15);
}

.form-select option { background:#111827; color:var(--snow) }

.checkbox-group {
  display:flex;
  gap:10px;
}

.checkbox-label {
  display:flex;
  align-items:center;
  gap:7px;
  font-size:0.85rem;
  cursor:pointer;
  padding:9px 14px;
  border:1px solid var(--border);
  border-radius:12px;
  background:rgba(255,255,255,0.04);
  transition:all 0.2s;
  flex:1;
  justify-content:center;
  user-select:none;
}

.form-section-sep {
  grid-column:1/-1;
  border:none;
  border-top:1px solid var(--border);
  margin:4px 0;
}

.form-section-label {
  grid-column:1/-1;
  font-size:0.6rem;
  text-transform:uppercase;
  letter-spacing:0.15em;
  color:var(--fog-dim);
  font-family:'JetBrains Mono',monospace;
  font-weight:600;
  padding:2px 0 6px;
}

.checkbox-label:has(input:checked) {
  border-color:var(--blue);
  background:rgba(96,165,250,0.12);
  color:var(--blue);
}

.checkbox-label input { display:none }

.modal-actions {
  display:flex;
  gap:10px;
  margin-top:20px;
}

.btn-cancel {
  flex:1;
  background:var(--glass);
  border:1px solid var(--border);
  color:var(--fog);
  font-family:'Plus Jakarta Sans',sans-serif;
  font-size:0.9rem;
  font-weight:600;
  padding:13px;
  border-radius:14px;
  cursor:pointer;
  transition:all 0.2s;
}

.btn-cancel:hover { border-color:var(--border-strong); color:var(--snow) }

.btn-add {
  flex:2;
  background:var(--grad-blue);
  border:none;
  color:#fff;
  font-family:'Plus Jakarta Sans',sans-serif;
  font-size:0.9rem;
  font-weight:700;
  padding:13px;
  border-radius:14px;
  cursor:pointer;
  transition:all 0.2s;
  box-shadow:0 4px 16px rgba(96,165,250,0.3);
}

.btn-add:hover { transform:translateY(-1px); box-shadow:0 6px 20px rgba(96,165,250,0.45) }
.btn-add:active { transform:translateY(0) }

/* ── Rentabilité ── */
.rentab-bar-track {
  background:rgba(255,255,255,0.05);
  border-radius:99px;
  height:12px;
  overflow:hidden;
  position:relative;
  margin:10px 0 6px;
}

.rentab-bar-fill {
  height:100%;
  border-radius:99px;
  transition:width 1.6s cubic-bezier(0.23,1,0.32,1);
  width:0%;
  position:relative;
  overflow:hidden;
}

.rentab-bar-fill::after {
  content:'';
  position:absolute;
  top:0;left:0;right:0;bottom:0;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,0.3),transparent);
  animation:shimmer 2s infinite;
}

.rentab-status {
  display:inline-flex;
  align-items:center;
  gap:6px;
  font-size:0.75rem;
  font-family:'JetBrains Mono',monospace;
  font-weight:700;
  padding:4px 12px;
  border-radius:8px;
  margin-top:4px;
}

.rentab-status.ok {
  background:rgba(52,211,153,0.15);
  border:1px solid rgba(52,211,153,0.35);
  color:var(--green);
}

.rentab-status.nok {
  background:rgba(251,191,36,0.15);
  border:1px solid rgba(251,191,36,0.35);
  color:var(--gold);
}

/* ── Reduced motion ── */
@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after {
    animation-duration:0.01ms !important;
    animation-iteration-count:1 !important;
    transition-duration:0.1ms !important;
  }
  .reveal { opacity:1; transform:none }
}

/* Person cards */
.persons { display:grid; grid-template-columns:1fr 1fr; gap:14px; margin-bottom:8px }

.person-card {
  background:var(--glass);
  border:1px solid var(--border);
  border-radius:24px;
  backdrop-filter:blur(20px);
  transition:all 0.3s ease;
  padding:24px 18px;
  position:relative;
  overflow:hidden;
}

.person-card:hover {
  border-color:var(--border-strong);
  transform:translateY(-2px);
  box-shadow:var(--glow-blue);
}

.person-card::before {
  content:'';
  position:absolute;
  top:0; left:0; right:0;
  height:4px;
  opacity:0.8;
}

.person-card.gaetan::before {
  background:var(--grad-blue);
  box-shadow:0 0 20px rgba(96,165,250,0.3);
}

.person-card.noemie::before {
  background:var(--grad-green);
  box-shadow:0 0 20px rgba(52,211,153,0.3);
}

.person-avatar {
  font-size:2rem;
  margin-bottom:10px;
  filter:drop-shadow(0 4px 6px rgba(0,0,0,0.3));
  display:inline-block;
  animation:float 3s ease-in-out infinite;
}

@keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-5px)} }

.person-name {
  font-size:0.7rem;
  letter-spacing:0.15em;
  text-transform:uppercase;
  color:var(--fog);
  font-family:'JetBrains Mono',monospace;
  margin-bottom:14px;
  font-weight:600;
}

.person-big {
  font-size:3rem;
  font-weight:800;
  line-height:1;
  margin-bottom:4px;
}

.person-big.blue {
  background:var(--grad-blue);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

.person-big.green {
  background:var(--grad-green);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

.person-sub {
  font-size:0.75rem;
  color:var(--fog);
  font-family:'JetBrains Mono',monospace;
  margin-bottom:18px;
}

.person-stats { display:flex; flex-direction:column; gap:8px }

.pstat {
  display:flex;
  justify-content:space-between;
  align-items:center;
  font-size:0.75rem;
  padding:6px 0;
  border-bottom:1px solid var(--border);
}

.pstat:last-child { border-bottom:none }
.pstat .k { color:var(--fog-dim); font-weight:500 }
.pstat .v {
  font-weight:700;
  font-family:'JetBrains Mono',monospace;
  color:var(--snow);
}

/* Big metric */
.big-metric {
  background:var(--glass);
  border:1px solid var(--border);
  border-radius:24px;
  backdrop-filter:blur(20px);
  transition:all 0.3s ease;
  padding:28px 24px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:16px;
  position:relative;
  overflow:hidden;
}

.big-metric:hover {
  border-color:var(--border-strong);
  transform:translateY(-2px);
  box-shadow:var(--glow-blue);
}

.big-metric::before {
  content:'';
  position:absolute;
  top:-50%; right:-50%;
  width:200%; height:200%;
  background:radial-gradient(circle,rgba(52,211,153,0.1) 0%,transparent 70%);
  animation:rotate 20s linear infinite;
}

@keyframes rotate { from{transform:rotate(0deg)} to{transform:rotate(360deg)} }

.big-metric .label {
  font-size:0.75rem;
  color:var(--fog);
  font-family:'JetBrains Mono',monospace;
  letter-spacing:0.08em;
  margin-bottom:6px;
  font-weight:600;
}

.big-metric .amount {
  font-size:2.8rem;
  font-weight:800;
  background:linear-gradient(135deg,#34d399 0%,#10b981 100%);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  line-height:1;
  position:relative;
  z-index:1;
}

.big-metric .sub {
  font-size:0.75rem;
  color:var(--fog);
  font-family:'JetBrains Mono',monospace;
  margin-top:6px;
  position:relative;
  z-index:1;
}

.big-metric .badge {
  background:rgba(52,211,153,0.15);
  border:1px solid rgba(52,211,153,0.3);
  color:var(--green);
  font-family:'JetBrains Mono',monospace;
  font-size:1.8rem;
  font-weight:700;
  padding:12px 18px;
  border-radius:16px;
  position:relative;
  z-index:1;
  animation:trophy 3s infinite;
}

@keyframes trophy { 0%,100%{filter:brightness(1)} 50%{filter:brightness(1.3)} }

/* Savings card */
.sav-card {
  background:var(--glass);
  border:1px solid var(--border);
  border-radius:24px;
  padding:24px;
  backdrop-filter:blur(20px);
  transition:all 0.3s ease;
}

.sav-row { margin-bottom:24px }
.sav-row:last-child { margin-bottom:0 }

.sav-head {
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:10px;
}

.sav-name {
  font-size:0.85rem;
  font-weight:700;
  display:flex;
  align-items:center;
  gap:8px;
}

.sav-pct {
  font-family:'JetBrains Mono',monospace;
  font-size:0.85rem;
  font-weight:700;
  padding:4px 10px;
  border-radius:8px;
  background:rgba(52,211,153,0.1);
}

.sav-pct.high {
  color:var(--green);
  background:rgba(52,211,153,0.15);
  border:1px solid rgba(52,211,153,0.3);
}

.sav-pct.mid {
  color:var(--gold);
  background:rgba(251,191,36,0.15);
  border:1px solid rgba(251,191,36,0.3);
}

.bar-track {
  background:rgba(255,255,255,0.05);
  border-radius:99px;
  height:10px;
  overflow:hidden;
  position:relative;
}

.bar-fill {
  height:100%;
  border-radius:99px;
  width:0%;
  transition:width 1.4s cubic-bezier(0.23,1,0.32,1);
  position:relative;
  overflow:hidden;
}

.bar-fill::after {
  content:'';
  position:absolute;
  top:0; left:0; right:0; bottom:0;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,0.3),transparent);
  animation:shimmer 2s infinite;
}

@keyframes shimmer { 0%{transform:translateX(-100%)} 100%{transform:translateX(100%)} }

.bar-fill.gaetan-bar { background:var(--grad-blue) }
.bar-fill.noemie-bar { background:var(--grad-green) }

.sav-details {
  display:flex;
  justify-content:space-between;
  margin-top:8px;
  font-size:0.7rem;
  color:var(--fog);
  font-family:'JetBrains Mono',monospace;
  font-weight:500;
}

.sav-person-label {
  font-size:0.8rem;
  font-weight:700;
  color:var(--snow);
  margin-bottom:16px;
  font-family:'JetBrains Mono',monospace;
  letter-spacing:0.08em;
  display:flex;
  align-items:center;
  gap:8px;
}

.sav-person-label::before {
  content:'';
  width:8px; height:8px;
  border-radius:50%;
  background:currentColor;
}

.sav-divider {
  border:none;
  border-top:1px solid var(--border);
  margin:24px 0;
}

/* Dual column layout */
.dual-col {
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:12px;
}

.dual-col-block {
  background:var(--glass);
  border:1px solid var(--border);
  border-radius:24px;
  backdrop-filter:blur(20px);
  transition:all 0.3s ease;
  padding:16px 12px;
  display:flex;
  flex-direction:column;
}

.dual-col-block:hover {
  border-color:var(--border-strong);
}

.dual-col-header {
  font-size:0.8rem;
  font-weight:700;
  font-family:'JetBrains Mono',monospace;
  padding:0 4px 12px;
  border-bottom:1px solid var(--border);
  margin-bottom:10px;
  display:flex;
  align-items:center;

<body>

<div id="dashboard"></div>

<!-- ============================================================
  AMIS — ajouter ici les accompagnateurs récurrents
  Format : "id": { "name": "Prénom", "emoji": "🎿" }
============================================================ -->
<!-- ============================================================
  STATIONS — coordonnées GPS des télécabines / accès stations
============================================================ -->
<!-- ============================================================
  SORTIES — ajouter une ligne par sortie
  Champs : date (DD.MM.YY), station, type (ete|hiver),
           participants (["gaetan"] ou ["noemie"] ou ["gaetan","noemie"]),
           price (CHF par personne),
           days (optionnel, si séjour multi-jours),
           with (optionnel, ["id_ami"])
============================================================ -->
<script>
// ==========================================
// CHARGEMENT DES DONNÉES DEPUIS FICHIERS JSON EXTERNES
// ==========================================
// Sera initialisé par loadData() en async
let CONFIG = {}, FRIENDS = {}, GPX_TRACKS = {};
const RAW_DATA = { users: {
  gaetan: { id:'gaetan', name:'Gaëtan', emoji:'👨', passPrice:419, color:'blue' },
  noemie: { id:'noemie', name:'Noémie', emoji:'👱‍♀️', passPrice:419, color:'green' }
}, stations:{}, activities:[] };

function decodeDeltaGpx(raw) {
  const result = {};
  Object.entries(raw).forEach(([key, t]) => {
    const coords = [t.start.slice()];
    let cur = [Math.round(t.start[0]*10000), Math.round(t.start[1]*10000), Math.round(t.start[2]*10)];
    for (const d of t.deltas) {
      cur = [cur[0]+d[0], cur[1]+d[1], cur[2]+d[2]];
      coords.push([cur[0]/10000, cur[1]/10000, cur[2]/10]);
    }
    result[key] = { label:t.label, date:t.date, distKm:t.distKm,
      dPos:t.dPos, dNeg:t.dNeg, altMin:t.altMin, altMax:t.altMax, coords };
  });
  return result;
}

async function loadData() {
  // Chemin absolu basé sur l'URL de la page (fonctionne sur GitHub Pages)
  const base = window.location.href.replace(/\/[^\/]*(\?.*)?$/, '/');
  const get = async (file) => {
    const url = base + 'data/' + file;
    const res = await fetch(url);
    if (!res.ok) throw new Error('Impossible de charger ' + url + ' (' + res.status + ')');
    return res.json();
  };
  try {
    const [cfg, friends, stations, activities, gpxRaw] = await Promise.all([
      get('config.json'), get('friends.json'), get('stations.json'),
      get('activities.json'), get('gpx.json')
    ]);
    const _cfg = cfg;
    Object.assign(CONFIG, _cfg, {
      get kmCostChf() { return (this.litersPerHundredKm * this.fuelPriceChf) / 100; }
    });
    Object.assign(FRIENDS, friends);
    RAW_DATA.stations = stations;
    RAW_DATA.activities = activities;
    GPX_TRACKS = decodeDeltaGpx(gpxRaw);
    return true;
  } catch(e) {
    console.error('Erreur chargement données:', e);
    document.getElementById('dashboard').innerHTML =
      '<div style="color:#ef4444;padding:40px;text-align:center;font-family:sans-serif">' +
      '⚠️ Impossible de charger les données.<br><small>' + e.message + '</small></div>';
    return false;
  }
}

// ==========================================
// CALCULS (refactorisé)
// ==========================================
const Calculator = {
  // Retourne le prix par personne pour une activité donnée
  // Pour les activités en duo, price est le prix par personne
  // Pour les activités solo, price est le prix total
  getUserActivities(userId) {
    return RAW_DATA.activities.filter(a => a.participants.includes(userId));
  },

  getUserStats(userId) {
    const activities = this.getUserActivities(userId);
    const user = RAW_DATA.users[userId];
    
    let totalValue = 0, totalDays = 0;
    const bySeason = { ete: [], hiver: [] };

    activities.forEach(a => {
      const days = a.days || 1;
      totalValue += a.price;   // price = valeur par personne
      totalDays += days;
      bySeason[a.type].push(a);
    });

    const seasonStats = {
      ete: {
        days: bySeason.ete.reduce((s, a) => s + (a.days || 1), 0),
        value: bySeason.ete.reduce((s, a) => s + a.price, 0)
      },
      hiver: {
        days: bySeason.hiver.reduce((s, a) => s + (a.days || 1), 0),
        value: bySeason.hiver.reduce((s, a) => s + a.price, 0)
      }
    };

    const savings = totalValue - user.passPrice;
    const discountRate = totalValue > 0 ? Math.round((savings / totalValue) * 100) : 0;
    const costPerDay = totalDays > 0 ? Math.round(user.passPrice / totalDays) : 0;
    const rentabilite = Math.min(100, Math.round((totalValue / user.passPrice) * 100));
    const rentabRemaining = Math.max(0, user.passPrice - totalValue);

    return {
      user, activities, totalDays, totalValue, passPrice: user.passPrice,
      savings, discountRate, costPerDay,
      rentabilite, rentabRemaining,
      bySeason: seasonStats,
      seasonPercentages: {
        ete: totalValue > 0 ? Math.round((seasonStats.ete.value / totalValue) * 100) : 0,
        hiver: totalValue > 0 ? Math.round((seasonStats.hiver.value / totalValue) * 100) : 0
      }
    };
  },

  getAllStats() {
    return { gaetan: this.getUserStats('gaetan'), noemie: this.getUserStats('noemie') };
  },

  haversine(lat1, lng1, lat2, lng2) {
    const R = 6371;
    const dLat = (lat2 - lat1) * Math.PI / 180;
    const dLng = (lng2 - lng1) * Math.PI / 180;
    const a = Math.sin(dLat/2)**2 +
              Math.cos(lat1 * Math.PI/180) * Math.cos(lat2 * Math.PI/180) * Math.sin(dLng/2)**2;
    return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
  },

  roadKm(lat1, lng1, lat2, lng2) {
    return Math.round(this.haversine(lat1, lng1, lat2, lng2) * 1.35);
  },

  getKmStats() {
    // Utilise les vraies distances routières configurées dans CONFIG.stationDistances
    // Chaque sortie = 1 aller-retour
    let totalKm = 0;
    const byStation = {};

    RAW_DATA.activities.forEach(a => {
      const kmAller = CONFIG.stationDistances[a.station] ?? 0;
      const byTrain = kmAller === 0 && CONFIG.stationDistances[a.station] === 0;
      const kmAR = byTrain ? 0 : kmAller * 2;
      totalKm += kmAR;
      if (!byStation[a.station]) {
        byStation[a.station] = { kmAller, kmAR, trips: 0, totalKm: 0, byTrain };
      }
      byStation[a.station].trips++;
      byStation[a.station].totalKm += kmAR;
    });

    const ranking = Object.entries(byStation)
      .map(([name, d]) => ({ name, ...d }))
      .sort((a, b) => b.totalKm - a.totalKm);

    const totalCost = totalKm * CONFIG.kmCostChf;

    return {
      totalKm: Math.round(totalKm),
      totalLiters: Math.round(totalKm * CONFIG.litersPerHundredKm / 100),
      totalCost: Math.round(totalCost * 10) / 10,
      totalTrips: ranking.reduce((s,r) => s+r.trips, 0),
      ranking
    };
  },

  // Agrégation des stations avec filtres optionnels
  getStationAggregates(filters = { season: 'all', person: 'all' }) {
    const agg = {};
    
    RAW_DATA.activities.forEach(a => {
      if (filters.season !== 'all' && a.type !== filters.season) return;

      const originalParticipants = a.participants;
      // Filtre : l'activité doit concerner la personne demandée
      if (filters.person !== 'all' && !originalParticipants.includes(filters.person)) return;

      // En mode POV (personne filtrée), on compte 1 pour les stats
      // mais on conserve la liste réelle pour afficher "ensemble" ou "seul"
      const countParticipants = filters.person !== 'all' ? 1 : originalParticipants.length;

      if (!agg[a.station]) {
        agg[a.station] = {
          ...RAW_DATA.stations[a.station],
          visits: 0, totalSpent: 0,
          types: new Set(), participants: new Set(), details: []
        };
      }
      
      const days = a.days || 1;
      agg[a.station].visits += countParticipants * days;
      agg[a.station].totalSpent += a.price * countParticipants;
      agg[a.station].types.add(a.type);
      // Tous les vrais participants sont conservés pour l'affichage
      originalParticipants.forEach(p => agg[a.station].participants.add(p));
      agg[a.station].details.push({
        ...a,
        participants: originalParticipants,
        visitCount: countParticipants * days,
        spentAtStation: a.price * countParticipants
      });
    });

    return Object.values(agg).map(s => ({
      ...s,
      types: Array.from(s.types),
      participants: Array.from(s.participants),
      type: s.types.has('ete') && s.types.has('hiver') ? 'both' : s.types.has('ete') ? 'ete' : 'hiver'
    }));
  }
};

                    <input type="checkbox" class="friend-chk" value="${id}"> ${f.emoji} ${f.name}
                  </label>`
                ).join('')}
              </div>
              <div style="display:flex;gap:8px;align-items:center" id="add-friend-row">
                <input class="form-input" id="inp-new-friend-name" type="text" placeholder="Prénom" style="flex:1">
                <input class="form-input" id="inp-new-friend-emoji" type="text" placeholder="🎿" style="width:60px;text-align:center">
                <button type="button" id="btn-add-friend" style="background:var(--grad-blue);border:none;color:white;font-size:1.1rem;width:38px;height:38px;border-radius:10px;cursor:pointer;flex-shrink:0">+</button>
              </div>
            </div>
            <div class="form-group">
              <label class="form-label" for="inp-days">Nbre de jours</label>
              <input class="form-input" id="inp-days" type="number" min="1" value="1">
            </div>
          </div>
          <div class="modal-actions">
            <button class="btn-cancel" id="modalCancel">Annuler</button>
            <button class="btn-add" id="modalConfirm">Ajouter la sortie</button>
          </div>
        </div>
      </div>
    `;
  },

  setupModal() {
    const overlay = document.getElementById('modalOverlay');
    const fab = document.getElementById('fabBtn');
    const cancel = document.getElementById('modalCancel');
    const confirm = document.getElementById('modalConfirm');
    let selectedType = 'ete';

    const open = () => overlay.classList.add('open');
    const close = () => overlay.classList.remove('open');

    fab.addEventListener('click', open);
    cancel.addEventListener('click', close);
    overlay.addEventListener('click', (e) => { if (e.target === overlay) close(); });

    // Ajout d'un nouvel ami depuis le formulaire
    document.getElementById('btn-add-friend').addEventListener('click', () => {
      const nameEl = document.getElementById('inp-new-friend-name');
      const emojiEl = document.getElementById('inp-new-friend-emoji');
      const name = nameEl.value.trim();
      const emoji = emojiEl.value.trim() || '🧑';
      if (!name) { nameEl.focus(); return; }
      const id = name.toLowerCase().replace(/\s+/g, '_');
      if (!FRIENDS[id]) {
        FRIENDS[id] = { name, emoji };
        Storage.saveFriends();
      }
      // Ajouter la checkbox dans la liste
      const box = document.getElementById('friends-checkboxes');
      const lbl = document.createElement('label');
      lbl.className = 'checkbox-label';
      lbl.style.flex = '0 0 auto';
      lbl.innerHTML = `<input type="checkbox" class="friend-chk" value="${id}" checked> ${emoji} ${name}`;
      box.appendChild(lbl);
      nameEl.value = '';
      emojiEl.value = '';
    });

    // Type selector inside modal
    document.querySelectorAll('[data-modal-type]').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('[data-modal-type]').forEach(b => {
          b.classList.remove('active');
          b.setAttribute('aria-pressed', 'false');
        });
        btn.classList.add('active');
        btn.setAttribute('aria-pressed', 'true');
        selectedType = btn.dataset.modalType;
      });
    });

    confirm.addEventListener('click', () => {
      const date = document.getElementById('inp-date').value.trim();
      const station = document.getElementById('inp-station').value;
      const price = parseFloat(document.getElementById('inp-price').value);
      const days = parseInt(document.getElementById('inp-days').value) || 1;
      const participants = [];
      const withFriends = [...document.querySelectorAll('.friend-chk:checked')].map(el => el.value);
      if (document.getElementById('chk-gaetan').checked) participants.push('gaetan');
      if (document.getElementById('chk-noemie').checked) participants.push('noemie');

      if (!date || !station || isNaN(price) || participants.length === 0) {
        alert('Merci de remplir tous les champs obligatoires (date, station, prix, au moins un participant).');
        return;
      }

      // Ajouter la station si inconnue
      if (!RAW_DATA.stations[station]) {
        RAW_DATA.stations[station] = { name: station, lat: 46.8, lng: 7.2 };
      }

      RAW_DATA.activities.push({
        date, station, type: selectedType, participants, price,
        ...(days > 1 && { days }),
        ...(withFriends.length > 0 && { with: withFriends })
      });
      Storage.saveActivities();

      close();
      // Re-render
      const stats = Calculator.getAllStats();
      this.container.innerHTML = this.render(stats);
      this.afterRender(stats);
      this.setupMapResize();
      this.setupScrollReveal();
      this.setupNav();
      this.setupModal();
    });
  },

  setupScrollReveal() {
    const els = document.querySelectorAll('.reveal');
    const obs = new IntersectionObserver((entries) => {
      entries.forEach(e => {
        if (e.isIntersecting) {
          e.target.classList.add('visible');
          obs.unobserve(e.target);
        }
      });
    }, { threshold: 0.1 });
    els.forEach(el => obs.observe(el));
  },

  setupNav() {
    const sections = ['sec-stats', 'sec-sorties', 'sec-valeur', 'sec-carte', 'sec-km'];
    const navBtns = document.querySelectorAll('.nav-btn');

    const obs = new IntersectionObserver((entries) => {
      entries.forEach(e => {
        if (e.isIntersecting) {
          const id = e.target.id;
          navBtns.forEach(btn => {
            const matches = btn.getAttribute('href') === `#${id}`;
            btn.classList.toggle('active', matches);
          });
        }
      });
    }, { rootMargin: '-40% 0px -55% 0px' });

    sections.forEach(id => {
      const el = document.getElementById(id);
      if (el) obs.observe(el);
    });

    navBtns.forEach(btn => {
      btn.addEventListener('click', (e) => {
        e.preventDefault();
        const target = document.querySelector(btn.getAttribute('href'));
        if (target) target.scrollIntoView({ behavior: 'smooth', block: 'start' });
      });
    });
  },

  setupMapResize() {
    const wrapper = document.getElementById('mapWrapper');
    if (!wrapper) return;
    const handle = wrapper.querySelector('.resize-handle');
    let isResizing = false, startX, startY, startW, startH;

    handle.addEventListener('mousedown', (e) => {
      isResizing = true;
      startX = e.clientX;
      startY = e.clientY;
      startW = parseInt(getComputedStyle(wrapper).width, 10);
      startH = parseInt(getComputedStyle(wrapper).height, 10);
      document.body.style.cursor = 'nwse-resize';
      e.preventDefault();
    });

    // Support touch pour mobile
    handle.addEventListener('touchstart', (e) => {
      isResizing = true;
      startX = e.touches[0].clientX;
      startY = e.touches[0].clientY;
      startW = parseInt(getComputedStyle(wrapper).width, 10);
      startH = parseInt(getComputedStyle(wrapper).height, 10);
      e.preventDefault();
    }, { passive: false });

    const doResize = (clientX, clientY) => {
      if (!isResizing) return;
      const newW = startW + clientX - startX;
      const newH = startH + clientY - startY;
      if (newH > 280) wrapper.style.height = newH + 'px';
      if (newW > 260) wrapper.style.width = newW + 'px';
      if (this.map) this.map.invalidateSize();
    };

    document.addEventListener('mousemove', (e) => doResize(e.clientX, e.clientY));
    document.addEventListener('touchmove', (e) => doResize(e.touches[0].clientX, e.touches[0].clientY), { passive: true });

    document.addEventListener('mouseup', () => { isResizing = false; document.body.style.cursor = ''; });
    document.addEventListener('touchend', () => { isResizing = false; });
  },

  afterRender(stats) {
    setTimeout(() => {
      // Barres animées (discount + saisons)
      document.querySelectorAll('.bar-fill[data-target]').forEach(b => b.style.width = b.dataset.target + '%');
      // Barres rentabilité
      document.querySelectorAll('.rentab-bar-fill[data-target]').forEach(b => b.style.width = b.dataset.target + '%');
      this.drawPie('pieGaetan', stats.gaetan.passPrice, stats.gaetan.savings, -65);
      this.drawPie('pieNoemie', stats.noemie.passPrice, stats.noemie.savings, -45);
      this.initMap();
      this.setupFilters();
    }, 100);
  },

  setupFilters() {
    document.querySelectorAll('.control-btn[data-filter]').forEach(btn => {
      btn.addEventListener('click', (e) => {
        const filter = e.target.dataset.filter;
        const value = e.target.dataset.value;
        document.querySelectorAll(`.control-btn[data-filter="${filter}"]`).forEach(b => {
          b.classList.remove('active');
          b.setAttribute('aria-pressed', 'false');
        });
        e.target.classList.add('active');
        e.target.setAttribute('aria-pressed', 'true');
        this.currentFilters[filter] = value;
        this.updateMapMarkers();
      });
    });
  },

  updateMapMarkers() {
    if (!this.map) return;
    this.map.eachLayer(layer => { if (layer instanceof L.Marker) layer.remove(); });
    
    // Utilise désormais Calculator.getStationAggregates() avec filtres (refacto)
    const stations = Calculator.getStationAggregates(this.currentFilters);
    
    stations.forEach(s => {
      // Couleur = saison | bordure dorée = ensemble
      const isTogether = s.participants.length === 2;
      const suffix = isTogether ? 'together' : 'solo';
      const markerClass = `${s.type}-${suffix}`;

      const icon = L.divIcon({
        className: 'custom-marker',
        html: `<div class="marker-pin ${markerClass}">${s.visits}</div>`,
        iconSize: [44, 44], iconAnchor: [22, 22], popupAnchor: [0, -22]
      });
      const marker = L.marker([s.lat, s.lng], { icon }).addTo(this.map);

      const typeLabel = s.type === 'ete' ? '🥾 Randonnée été' : s.type === 'hiver' ? '⛷ Ski hiver' : '🥾⛷ Été & Hiver';
      const presence = isTogether ? '👫 Ensemble' : s.participants[0] === 'gaetan' ? '👨 Gaëtan seul' : '👱‍♀️ Noémie seule';

        const isTogetherDetail = d.participants.length === 2;
        const whoCls = isTogetherDetail ? 'presence-together' : d.participants[0] === 'gaetan' ? 'presence-gaetan' : 'presence-noemie';
        const whoLabel = isTogetherDetail ? '👫 Ensemble' : d.participants[0] === 'gaetan' ? '👨 seul' : '👱‍♀️ seule';
        const daysLabel = d.days > 1 ? ` · ${d.days}j` : '';
        const friendsList = (d.with || [])
          .map(id => FRIENDS[id] ? `<span style="display:inline-flex;align-items:center;gap:3px;background:rgba(251,191,36,0.12);border:1px solid rgba(251,191,36,0.3);border-radius:6px;padding:1px 6px;font-size:0.65rem;color:#92400e">${FRIENDS[id].emoji} ${FRIENDS[id].name}</span>` : id);
        const friendsHtml = friendsList.length

        visitsHtml += `

            <span style="display:flex;flex-direction:column;gap:3px;">
              <span style="color:#374151;font-family:JetBrains Mono;font-size:0.75rem;font-weight:600">${d.date}${daysLabel}</span>
              <span class="presence-badge ${whoCls}" style="font-size:0.65rem;padding:2px 8px">${whoLabel}</span>
              ${friendsHtml}
            </span>
            <span style="color:#7c3aed;font-family:JetBrains Mono;font-weight:700;font-size:0.85rem;margin-left:8px">${d.price} CHF</span>
          </div>`;
      });
      visitsHtml += '</div></div>';

      // Cherche par nom exact ou par clé courte (ex: "Schwarzsee (Lac Noir)" → cherche "Schwarzsee")
      const stationKey = Object.keys(CONFIG.stationDistances).find(k => s.name && s.name.startsWith(k)) || s.name;
      const distKm = CONFIG.stationDistances[stationKey] ?? Calculator.roadKm(CONFIG.home.lat, CONFIG.home.lng, s.lat, s.lng);
      const byTrain = distKm === 0;
      const distCost = byTrain ? 0 : Math.round(distKm * 2 * CONFIG.kmCostChf * s.details.length * 10) / 10;
      // Bloc GPX si une trace existe pour cette station
      const gpxKey = Object.keys(GPX_TRACKS).find(k => s.name && s.name.startsWith(k));
      const gpxData = gpxKey ? GPX_TRACKS[gpxKey] : null;
      const gpxPanelBlock = gpxData ? `
        <div style="margin-top:14px;padding-top:14px;border-top:1px solid var(--border)">
          <div style="font-size:0.6rem;letter-spacing:0.15em;text-transform:uppercase;color:var(--fog);font-family:'JetBrains Mono',monospace;font-weight:600;margin-bottom:10px">🥾 ${gpxData.label}</div>
          <div class="map-info-grid">
            <div class="map-info-stat" style="background:rgba(245,158,11,0.08);border:1px solid rgba(245,158,11,0.2)">
              <div class="map-info-stat-label">Distance</div>
              <div class="map-info-stat-value" style="color:#d97706">${gpxData.distKm} km</div>
            </div>
            <div class="map-info-stat" style="background:rgba(239,68,68,0.08);border:1px solid rgba(239,68,68,0.2)">
              <div class="map-info-stat-label">D+</div>
              <div class="map-info-stat-value" style="color:#ef4444">+${gpxData.dPos} m</div>
            </div>
            <div class="map-info-stat" style="background:rgba(16,185,129,0.08);border:1px solid rgba(16,185,129,0.2)">
              <div class="map-info-stat-label">D-</div>
              <div class="map-info-stat-value" style="color:#10b981">-${gpxData.dNeg} m</div>
            </div>
            <div class="map-info-stat" style="background:rgba(96,165,250,0.08);border:1px solid rgba(96,165,250,0.2)">
              <div class="map-info-stat-label">Alt. min/max</div>

      marker.on('click', () => {

        content.innerHTML = `
          <div class="map-info-title">${s.name}</div>

          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">
            <span class="presence-badge ${presenceClass}">${presence}</span>
            <span style="font-weight:800;color:#7c3aed;font-size:1.1rem">${s.totalSpent} CHF · ${s.visits}j</span>
          </div>
          <div style="font-size:0.6rem;letter-spacing:0.15em;text-transform:uppercase;color:var(--fog);font-family:'JetBrains Mono',monospace;font-weight:600;margin-bottom:8px">📅 Sorties</div>
          <div style="display:flex;flex-direction:column;gap:6px;margin-bottom:${gpxData ? '0' : '2px'}">
            ${s.details.map(d => {
              const isTogetherDetail = d.participants.length === 2;
              const whoCls = isTogetherDetail ? 'presence-together' : d.participants[0] === 'gaetan' ? 'presence-gaetan' : 'presence-noemie';
              const whoLabel = isTogetherDetail ? '👫 Ensemble' : d.participants[0] === 'gaetan' ? '👨 seul' : '👱‍♀️ seule';
              const daysLabel = d.days > 1 ? ` · ${d.days}j` : '';
              const friendsList = (d.with || []).map(id => FRIENDS[id]

                : id);
              const friendsHtml = friendsList.length ? `<div style="display:flex;flex-wrap:wrap;gap:4px;margin-top:3px">${friendsList.join('')}</div>` : '';

                </span>
                <span style="color:#7c3aed;font-family:'JetBrains Mono',monospace;font-weight:700;font-size:0.9rem;margin-left:8px">${d.price} CHF</span>

          ${gpxPanelBlock}

        `;
        panel.style.display = 'block';
        panel.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
      });
    });
    
    if (stations.length) {
      const group = new L.featureGroup(stations.map(s => L.marker([s.lat, s.lng])));
      this.map.fitBounds(group.getBounds().pad(0.15));
    }
  },

  drawPie(canvasId, pass, savings, percent) {
    const c = document.getElementById(canvasId);
    if (!c) return;
    const ctx = c.getContext('2d'), cx = 80, cy = 80, r = 62;
    const total = pass + savings, passAngle = (pass / total) * Math.PI * 2;
    
    ctx.shadowBlur = 20;
    ctx.shadowColor = '#60a5fa';
    ctx.beginPath(); ctx.moveTo(cx, cy); ctx.arc(cx, cy, r, -Math.PI/2 + 0.05, -Math.PI/2 + passAngle - 0.05); ctx.closePath();
    ctx.fillStyle = '#60a5fa'; ctx.fill();
    
    ctx.shadowColor = '#34d399';
    ctx.beginPath(); ctx.moveTo(cx, cy); ctx.arc(cx, cy, r, -Math.PI/2 + passAngle + 0.05, -Math.PI/2 + Math.PI*2 - 0.05); ctx.closePath();
    ctx.fillStyle = '#34d399'; ctx.fill();
    
    ctx.shadowBlur = 0;
    ctx.beginPath(); ctx.arc(cx, cy, r*0.55, 0, Math.PI*2); ctx.fillStyle = '#111827'; ctx.fill();
    ctx.beginPath(); ctx.arc(cx, cy, r*0.55, 0, Math.PI*2); ctx.strokeStyle = 'rgba(255,255,255,0.1)'; ctx.lineWidth = 2; ctx.stroke();
    
    ctx.fillStyle = '#f8fafc'; ctx.font = 'bold 16px "Plus Jakarta Sans"'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(`${percent}%`, cx, cy);
  },

                <div class="map-info-stat-value" style="color:#d97706">${gpxData.distKm} km</div>
              </div>
              <div class="map-info-stat" style="background:rgba(239,68,68,0.08);border:1px solid rgba(239,68,68,0.2)">
                <div class="map-info-stat-label">D+</div>
                <div class="map-info-stat-value" style="color:#ef4444">+${gpxData.dPos} m</div>
              </div>
              <div class="map-info-stat" style="background:rgba(16,185,129,0.08);border:1px solid rgba(16,185,129,0.2)">
                <div class="map-info-stat-label">D-</div>
                <div class="map-info-stat-value" style="color:#10b981">-${gpxData.dNeg} m</div>
              </div>
              <div class="map-info-stat" style="background:rgba(96,165,250,0.08);border:1px solid rgba(96,165,250,0.2)">
                <div class="map-info-stat-label">Alt. min/max</div>
                <div class="map-info-stat-value" style="color:#60a5fa">${gpxData.altMin}–${gpxData.altMax} m</div>
              </div>
            </div>
            <div class="map-info-sub">Départ à ${start[2]} m d'altitude</div>
          `;
          panel.style.display = 'block';
          panel.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        })
        .addTo(this.map);
    });
  }
};

// Démarrage
document.addEventListener('DOMContentLoaded', () => Renderer.init());
</script>
<!-- ============================================================
  SERVICE WORKER — Cache hors ligne + installation PWA
============================================================ -->
<script>
// ── Enregistrement du Service Worker via Blob (single-file) ──
const SW_CODE = `
const CACHE = 'magic-pass-v1';
const OFFLINE_URLS = [
  'https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap',
  'https://unpkg.com/leaflet@1.9.4/dist/leaflet.css',
  'https://unpkg.com/leaflet@1.9.4/dist/leaflet.js',
  'https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png'
];

self.addEventListener('install', e => {
  e.waitUntil(
    caches.open(CACHE).then(c =>
      Promise.allSettled(OFFLINE_URLS.map(u => c.add(u).catch(() => null)))
    ).then(() => self.skipWaiting())
  );
});

self.addEventListener('activate', e => {
  e.waitUntil(
    caches.keys().then(keys =>
      Promise.all(keys.filter(k => k !== CACHE).map(k => caches.delete(k)))
    ).then(() => self.clients.claim())
  );
});

self.addEventListener('fetch', e => {
  // Tuiles cartographiques : cache-first
  if (e.request.url.includes('carto') || e.request.url.includes('tile')) {
    e.respondWith(
      caches.open(CACHE).then(c =>
        c.match(e.request).then(cached =>
          cached || fetch(e.request).then(res => { c.put(e.request, res.clone()); return res; }).catch(() => cached)
        )
      )
    );
    return;
  }
  // Autres ressources : network-first avec fallback cache
  e.respondWith(
    fetch(e.request)
      .then(res => {
        if (res.ok) {
          const clone = res.clone();
          caches.open(CACHE).then(c => c.put(e.request, clone));
        }
        return res;
      })
      .catch(() => caches.match(e.request))
  );
});
`;

if ('serviceWorker' in navigator) {
  const blob = new Blob([SW_CODE], { type: 'application/javascript' });
  const swUrl = URL.createObjectURL(blob);
  navigator.serviceWorker.register(swUrl, { scope: './' })
    .then(reg => console.log('✅ SW enregistré', reg.scope))
    .catch(err => console.warn('SW échoué (normal en local):', err));
}

// ── Bannière d'installation personnalisée ──
let deferredPrompt = null;

window.addEventListener('beforeinstallprompt', (e) => {
  e.preventDefault();
  deferredPrompt = e;

  // Afficher bannière custom après 2s
  setTimeout(() => {
    const banner = document.createElement('div');
    banner.id = 'install-banner';
    banner.innerHTML = `
      <div style="
        position:fixed;bottom:20px;left:50%;transform:translateX(-50%);
        background:#1e2d3d;border:1px solid rgba(96,165,250,0.3);
        border-radius:16px;padding:14px 18px;
        display:flex;align-items:center;gap:12px;
        box-shadow:0 8px 32px rgba(0,0,0,0.6);
        z-index:9999;max-width:320px;width:calc(100% - 40px);
        animation:slideUp 0.4s cubic-bezier(0.23,1,0.32,1);
      ">
        <span style="font-size:1.8rem">⛷️</span>
        <div style="flex:1">
          <div style="font-weight:700;color:#f8fafc;font-size:0.85rem">Installer Magic Pass</div>
          <div style="color:#94a3b8;font-size:0.72rem;margin-top:2px">Accès rapide depuis l'écran d'accueil</div>
        </div>
        <button id="btn-install" style="
          background:linear-gradient(135deg,#3b82f6,#6366f1);
          color:white;border:none;border-radius:10px;
          padding:8px 14px;font-size:0.78rem;font-weight:700;
          cursor:pointer;white-space:nowrap;
        ">Installer</button>
        <button id="btn-dismiss" style="
          background:none;border:none;color:#6b7280;
          font-size:1.1rem;cursor:pointer;padding:4px;
        ">✕</button>
      </div>
    `;
    document.body.appendChild(banner);

    document.getElementById('btn-install').addEventListener('click', async () => {
      banner.remove();
      deferredPrompt.prompt();
      const { outcome } = await deferredPrompt.userChoice;
      console.log('Installation:', outcome);
      deferredPrompt = null;
    });

    document.getElementById('btn-dismiss').addEventListener('click', () => banner.remove());
  }, 2000);
});

window.addEventListener('appinstalled', () => {
  console.log('✅ App installée !');
  deferredPrompt = null;
});
</script>

<style>
@keyframes slideUp {
  from { opacity:0; transform:translateX(-50%) translateY(20px); }
  to   { opacity:1; transform:translateX(-50%) translateY(0); }
}
</style>
