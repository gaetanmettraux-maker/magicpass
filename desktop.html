<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Magic Pass 25-26 · Desktop</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
:root {
  --bg-deep: #0a0f1a;
  --glass: rgba(255,255,255,0.03);
  --border: rgba(255,255,255,0.08);
  --border-strong: rgba(255,255,255,0.15);
  --snow: #f8fafc;
  --fog: #94a3b8;
  --fog-dim: #64748b;
  --blue: #60a5fa;
  --green: #34d399;
  --gold: #fbbf24;
  --grad-blue: linear-gradient(135deg, #60a5fa 0%, #a78bfa 100%);
  --grad-green: linear-gradient(135deg, #34d399 0%, #fbbf24 100%);
  --grad-gold: linear-gradient(135deg, #fbbf24 0%, #f59e0b 100%);
  --shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
  --glow-blue: 0 0 40px rgba(96,165,250,0.1);
}

* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent }

html { scroll-behavior:smooth }

body {
  font-family:'Plus Jakarta Sans',sans-serif;
  background:var(--bg-deep);
  color:var(--snow);
  min-height:100vh;
  padding-bottom:24px;
  background-image:
    radial-gradient(ellipse at 20% 20%,rgba(96,165,250,0.15) 0%,transparent 50%),
    radial-gradient(ellipse at 80% 80%,rgba(52,211,153,0.1) 0%,transparent 50%);
  background-attachment:fixed;
}

#dashboard { max-width:520px; margin:0 auto; padding:24px 18px 40px }

@media (min-width:1024px) {
  #dashboard { max-width:100%; padding:0; margin:0; height:100vh; overflow:hidden; display:grid; grid-template-columns:480px 1fr; grid-template-rows:100vh; }
}

/* Header */
.header { text-align:center; padding:32px 0 36px }

.chip {
  display:inline-flex;
  align-items:center;
  gap:8px;
  background:var(--glass);
  border:1px solid var(--border);
  color:var(--blue);
  font-family:'JetBrains Mono',monospace;
  font-size:0.7rem;
  letter-spacing:0.12em;
  padding:8px 16px;
  border-radius:99px;
  margin-bottom:20px;
  text-transform:uppercase;
  backdrop-filter:blur(10px);
  box-shadow:var(--shadow);
}

.chip::before {
  content:'✦';
  color:var(--gold);
  animation:pulse 2s infinite;
}

@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.5} }

.header h1 {
  font-size:2.4rem;
  font-weight:800;
  line-height:1.15;
  margin-bottom:10px;
  letter-spacing:-0.02em;
  background:linear-gradient(135deg,#f8fafc 0%,#94a3b8 100%);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

.header h1 span {
  background:var(--grad-gold);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

.header p {
  color:var(--fog);
  font-size:0.85rem;
  font-family:'JetBrains Mono',monospace;
  letter-spacing:0.05em;
}

/* Section titles */
.section-title {
  font-size:0.7rem;
  letter-spacing:0.2em;
  text-transform:uppercase;
  color:var(--fog);
  font-family:'JetBrains Mono',monospace;
  margin:32px 0 14px;
  display:flex;
  align-items:center;
  gap:12px;
  font-weight:600;
}

.section-title::after {
  content:'';
  flex:1;
  height:1px;
  background:linear-gradient(90deg,var(--border),transparent);
}

.section-subtitle {
  font-size:0.75rem;
  color:var(--fog-dim);
  font-family:'JetBrains Mono',monospace;
  margin:-10px 0 16px;
  font-weight:500;
  font-style:italic;
}

/* Cards */
.card {
  background:var(--glass);
  border:1px solid var(--border);
  border-radius:24px;
  padding:24px;
  backdrop-filter:blur(20px);
  transition:all 0.3s ease;
}

.card:hover {
  border-color:var(--border-strong);
  transform:translateY(-2px);
  box-shadow:var(--glow-blue);
}

/* ── Sticky nav ── */
.sticky-nav {
  position:sticky;
  top:0;
  z-index:100;
  display:flex;
  justify-content:center;
  gap:6px;
  padding:10px 18px;
  background:rgba(10,15,26,0.85);
  backdrop-filter:blur(20px);
  border-bottom:1px solid var(--border);
  margin:0 -18px 24px;
}

.nav-btn {
  background:var(--glass);
  border:1px solid var(--border);
  color:var(--fog);
  font-family:'JetBrains Mono',monospace;
  font-size:0.65rem;
  font-weight:600;
  letter-spacing:0.08em;
  padding:7px 12px;
  border-radius:10px;
  cursor:pointer;
  transition:all 0.2s ease;
  display:flex;
  align-items:center;
  gap:5px;
  text-decoration:none;
  white-space:nowrap;
}

.nav-btn:hover {
  border-color:var(--border-strong);
  color:var(--snow);
  background:rgba(255,255,255,0.06);
}

.nav-btn.active {
  background:rgba(96,165,250,0.15);
  border-color:var(--blue);
  color:var(--blue);
}

/* ── Scroll reveal ── */
.reveal {
  opacity:0;
  transform:translateY(20px);
  transition:opacity 0.5s ease, transform 0.5s ease;
}

.reveal.visible {
  opacity:1;
  transform:translateY(0);
}

/* ── Add activity modal ── */
.fab {
  position:fixed;
  bottom:28px;
  right:28px;
  z-index:200;
  background:var(--grad-blue);
  border:none;
  border-radius:50%;
  width:56px;
  height:56px;
  font-size:1.4rem;
  cursor:pointer;
  box-shadow:0 8px 24px rgba(96,165,250,0.35);
  display:flex;
  align-items:center;
  justify-content:center;
  transition:all 0.25s ease;
}

.fab:hover {
  transform:scale(1.12) rotate(15deg);
  box-shadow:0 12px 32px rgba(96,165,250,0.5);
}

.modal-overlay {
  position:fixed;
  inset:0;
  z-index:300;
  background:rgba(0,0,0,0.7);
  backdrop-filter:blur(6px);
  display:flex;
  align-items:flex-end;
  justify-content:center;
  opacity:0;
  pointer-events:none;
  transition:opacity 0.25s ease;
}

.modal-overlay.open {
  opacity:1;
  pointer-events:all;
}

.modal-sheet {
  background:#111827;
  border:1px solid var(--border-strong);
  border-radius:28px 28px 0 0;
  padding:28px 24px 40px;
  width:100%;
  max-width:520px;
  transform:translateY(40px);
  transition:transform 0.3s cubic-bezier(0.23,1,0.32,1);
}

.modal-overlay.open .modal-sheet {
  transform:translateY(0);
}

.modal-handle {
  width:40px;
  height:4px;
  background:var(--border-strong);
  border-radius:2px;
  margin:0 auto 24px;
}

.modal-title {
  font-size:1.1rem;
  font-weight:800;
  margin-bottom:20px;
  display:flex;
  align-items:center;
  gap:10px;
}

.form-grid {
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:12px;
  margin-bottom:16px;
}

.form-full {
  grid-column:1/-1;
}

.form-group {
  display:flex;
  flex-direction:column;
  gap:6px;
}

.form-label {
  font-size:0.65rem;
  text-transform:uppercase;
  letter-spacing:0.12em;
  color:var(--fog);
  font-family:'JetBrains Mono',monospace;
  font-weight:600;
}

.form-input, .form-select {
  background:rgba(255,255,255,0.05);
  border:1px solid var(--border);
  border-radius:12px;
  color:var(--snow);
  font-family:'Plus Jakarta Sans',sans-serif;
  font-size:0.85rem;
  padding:10px 14px;
  outline:none;
  transition:border-color 0.2s;
  width:100%;
  appearance:none;
}

.form-input:focus, .form-select:focus {
  border-color:var(--blue);
  box-shadow:0 0 0 3px rgba(96,165,250,0.15);
}

.form-select option { background:#111827; color:var(--snow) }

.checkbox-group {
  display:flex;
  gap:10px;
}

.checkbox-label {
  display:flex;
  align-items:center;
  gap:7px;
  font-size:0.85rem;
  cursor:pointer;
  padding:9px 14px;
  border:1px solid var(--border);
  border-radius:12px;
  background:rgba(255,255,255,0.04);
  transition:all 0.2s;
  flex:1;
  justify-content:center;
  user-select:none;
}

.form-section-sep {
  grid-column:1/-1;
  border:none;
  border-top:1px solid var(--border);
  margin:4px 0;
}

.form-section-label {
  grid-column:1/-1;
  font-size:0.6rem;
  text-transform:uppercase;
  letter-spacing:0.15em;
  color:var(--fog-dim);
  font-family:'JetBrains Mono',monospace;
  font-weight:600;
  padding:2px 0 6px;
}

.checkbox-label:has(input:checked) {
  border-color:var(--blue);
  background:rgba(96,165,250,0.12);
  color:var(--blue);
}

.checkbox-label input { display:none }

.modal-actions {
  display:flex;
  gap:10px;
  margin-top:20px;
}

.btn-cancel {
  flex:1;
  background:var(--glass);
  border:1px solid var(--border);
  color:var(--fog);
  font-family:'Plus Jakarta Sans',sans-serif;
  font-size:0.9rem;
  font-weight:600;
  padding:13px;
  border-radius:14px;
  cursor:pointer;
  transition:all 0.2s;
}

.btn-cancel:hover { border-color:var(--border-strong); color:var(--snow) }

.btn-add {
  flex:2;
  background:var(--grad-blue);
  border:none;
  color:#fff;
  font-family:'Plus Jakarta Sans',sans-serif;
  font-size:0.9rem;
  font-weight:700;
  padding:13px;
  border-radius:14px;
  cursor:pointer;
  transition:all 0.2s;
  box-shadow:0 4px 16px rgba(96,165,250,0.3);
}

.btn-add:hover { transform:translateY(-1px); box-shadow:0 6px 20px rgba(96,165,250,0.45) }
.btn-add:active { transform:translateY(0) }

/* ── Rentabilité ── */
.rentab-bar-track {
  background:rgba(255,255,255,0.05);
  border-radius:99px;
  height:12px;
  overflow:hidden;
  position:relative;
  margin:10px 0 6px;
}

.rentab-bar-fill {
  height:100%;
  border-radius:99px;
  transition:width 1.6s cubic-bezier(0.23,1,0.32,1);
  width:0%;
  position:relative;
  overflow:hidden;
}

.rentab-bar-fill::after {
  content:'';
  position:absolute;
  top:0;left:0;right:0;bottom:0;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,0.3),transparent);
  animation:shimmer 2s infinite;
}

.rentab-status {
  display:inline-flex;
  align-items:center;
  gap:6px;
  font-size:0.75rem;
  font-family:'JetBrains Mono',monospace;
  font-weight:700;
  padding:4px 12px;
  border-radius:8px;
  margin-top:4px;
}

.rentab-status.ok {
  background:rgba(52,211,153,0.15);
  border:1px solid rgba(52,211,153,0.35);
  color:var(--green);
}

.rentab-status.nok {
  background:rgba(251,191,36,0.15);
  border:1px solid rgba(251,191,36,0.35);
  color:var(--gold);
}

/* ── Reduced motion ── */
@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after {
    animation-duration:0.01ms !important;
    animation-iteration-count:1 !important;
    transition-duration:0.1ms !important;
  }
  .reveal { opacity:1; transform:none }
}

/* Person cards */
.persons { display:grid; grid-template-columns:1fr 1fr; gap:14px; margin-bottom:8px }

.person-card {
  background:var(--glass);
  border:1px solid var(--border);
  border-radius:24px;
  backdrop-filter:blur(20px);
  transition:all 0.3s ease;
  padding:24px 18px;
  position:relative;
  overflow:hidden;
}

.person-card:hover {
  border-color:var(--border-strong);
  transform:translateY(-2px);
  box-shadow:var(--glow-blue);
}

.person-card::before {
  content:'';
  position:absolute;
  top:0; left:0; right:0;
  height:4px;
  opacity:0.8;
}

.person-card.gaetan::before {
  background:var(--grad-blue);
  box-shadow:0 0 20px rgba(96,165,250,0.3);
}

.person-card.noemie::before {
  background:var(--grad-green);
  box-shadow:0 0 20px rgba(52,211,153,0.3);
}

.person-avatar {
  font-size:2rem;
  margin-bottom:10px;
  filter:drop-shadow(0 4px 6px rgba(0,0,0,0.3));
  display:inline-block;
  animation:float 3s ease-in-out infinite;
}

@keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-5px)} }

.person-name {
  font-size:0.7rem;
  letter-spacing:0.15em;
  text-transform:uppercase;
  color:var(--fog);
  font-family:'JetBrains Mono',monospace;
  margin-bottom:14px;
  font-weight:600;
}

.person-big {
  font-size:3rem;
  font-weight:800;
  line-height:1;
  margin-bottom:4px;
}

.person-big.blue {
  background:var(--grad-blue);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

.person-big.green {
  background:var(--grad-green);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

.person-sub {
  font-size:0.75rem;
  color:var(--fog);
  font-family:'JetBrains Mono',monospace;
  margin-bottom:18px;
}

.person-stats { display:flex; flex-direction:column; gap:8px }

.pstat {
  display:flex;
  justify-content:space-between;
  align-items:center;
  font-size:0.75rem;
  padding:6px 0;
  border-bottom:1px solid var(--border);
}

.pstat:last-child { border-bottom:none }
.pstat .k { color:var(--fog-dim); font-weight:500 }
.pstat .v {
  font-weight:700;
  font-family:'JetBrains Mono',monospace;
  color:var(--snow);
}

/* Big metric */
.big-metric {
  background:var(--glass);
  border:1px solid var(--border);
  border-radius:24px;
  backdrop-filter:blur(20px);
  transition:all 0.3s ease;
  padding:28px 24px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:16px;
  position:relative;
  overflow:hidden;
}

.big-metric:hover {
  border-color:var(--border-strong);
  transform:translateY(-2px);
  box-shadow:var(--glow-blue);
}

.big-metric::before {
  content:'';
  position:absolute;
  top:-50%; right:-50%;
  width:200%; height:200%;
  background:radial-gradient(circle,rgba(52,211,153,0.1) 0%,transparent 70%);
  animation:rotate 20s linear infinite;
}

@keyframes rotate { from{transform:rotate(0deg)} to{transform:rotate(360deg)} }

.big-metric .label {
  font-size:0.75rem;
  color:var(--fog);
  font-family:'JetBrains Mono',monospace;
  letter-spacing:0.08em;
  margin-bottom:6px;
  font-weight:600;
}

.big-metric .amount {
  font-size:2.8rem;
  font-weight:800;
  background:linear-gradient(135deg,#34d399 0%,#10b981 100%);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  line-height:1;
  position:relative;
  z-index:1;
}

.big-metric .sub {
  font-size:0.75rem;
  color:var(--fog);
  font-family:'JetBrains Mono',monospace;
  margin-top:6px;
  position:relative;
  z-index:1;
}

.big-metric .badge {
  background:rgba(52,211,153,0.15);
  border:1px solid rgba(52,211,153,0.3);
  color:var(--green);
  font-family:'JetBrains Mono',monospace;
  font-size:1.8rem;
  font-weight:700;
  padding:12px 18px;
  border-radius:16px;
  position:relative;
  z-index:1;
  animation:trophy 3s infinite;
}

@keyframes trophy { 0%,100%{filter:brightness(1)} 50%{filter:brightness(1.3)} }

/* Savings card */
.sav-card {
  background:var(--glass);
  border:1px solid var(--border);
  border-radius:24px;
  padding:24px;
  backdrop-filter:blur(20px);
  transition:all 0.3s ease;
}

.sav-row { margin-bottom:24px }
.sav-row:last-child { margin-bottom:0 }

.sav-head {
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:10px;
}

.sav-name {
  font-size:0.85rem;
  font-weight:700;
  display:flex;
  align-items:center;
  gap:8px;
}

.sav-pct {
  font-family:'JetBrains Mono',monospace;
  font-size:0.85rem;
  font-weight:700;
  padding:4px 10px;
  border-radius:8px;
  background:rgba(52,211,153,0.1);
}

.sav-pct.high {
  color:var(--green);
  background:rgba(52,211,153,0.15);
  border:1px solid rgba(52,211,153,0.3);
}

.sav-pct.mid {
  color:var(--gold);
  background:rgba(251,191,36,0.15);
  border:1px solid rgba(251,191,36,0.3);
}

.bar-track {
  background:rgba(255,255,255,0.05);
  border-radius:99px;
  height:10px;
  overflow:hidden;
  position:relative;
}

.bar-fill {
  height:100%;
  border-radius:99px;
  width:0%;
  transition:width 1.4s cubic-bezier(0.23,1,0.32,1);
  position:relative;
  overflow:hidden;
}

.bar-fill::after {
  content:'';
  position:absolute;
  top:0; left:0; right:0; bottom:0;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,0.3),transparent);
  animation:shimmer 2s infinite;
}

@keyframes shimmer { 0%{transform:translateX(-100%)} 100%{transform:translateX(100%)} }

.bar-fill.gaetan-bar { background:var(--grad-blue) }
.bar-fill.noemie-bar { background:var(--grad-green) }

.sav-details {
  display:flex;
  justify-content:space-between;
  margin-top:8px;
  font-size:0.7rem;
  color:var(--fog);
  font-family:'JetBrains Mono',monospace;
  font-weight:500;
}

.sav-person-label {
  font-size:0.8rem;
  font-weight:700;
  color:var(--snow);
  margin-bottom:16px;
  font-family:'JetBrains Mono',monospace;
  letter-spacing:0.08em;
  display:flex;
  align-items:center;
  gap:8px;
}

.sav-person-label::before {
  content:'';
  width:8px; height:8px;
  border-radius:50%;
  background:currentColor;
}

.sav-divider {
  border:none;
  border-top:1px solid var(--border);
  margin:24px 0;
}

/* Dual column layout */
.dual-col {
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:12px;
}

.dual-col-block {
  background:var(--glass);
  border:1px solid var(--border);
  border-radius:24px;
  backdrop-filter:blur(20px);
  transition:all 0.3s ease;
  padding:16px 12px;
  display:flex;
  flex-direction:column;
}

.dual-col-block:hover {
  border-color:var(--border-strong);
}

.dual-col-header {
  font-size:0.8rem;
  font-weight:700;
  font-family:'JetBrains Mono',monospace;
  padding:0 4px 12px;
  border-bottom:1px solid var(--border);
  margin-bottom:10px;
  display:flex;
  align-items:center;
  justify-content:space-between;
}

.dual-col-header span {
  color:var(--fog);
  font-size:0.65rem;
  font-weight:500;
}

.gaetan-header {
  background:var(--grad-blue);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

.noemie-header {
  background:var(--grad-green);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

.season-label-sm {
  font-size:0.6rem;
  text-transform:uppercase;
  letter-spacing:0.15em;
  color:var(--fog);
  font-family:'JetBrains Mono',monospace;
  padding:6px 4px 4px;
  font-weight:600;
}

/* Activity rows */
.orow {
  display:grid;
  grid-template-columns:40px 1fr auto;
  gap:6px;
  align-items:center;
  padding:6px 4px;
  border-radius:8px;
  margin-bottom:3px;
  border-left:3px solid transparent;
  transition:background 0.2s ease;
  font-size:0.75rem;
}

.orow:hover { background:rgba(255,255,255,0.03) }
.orow.ete { border-left-color:var(--green) }
.orow.hiver { border-left-color:var(--blue) }

.or-date {
  font-family:'JetBrains Mono',monospace;
  font-size:0.6rem;
  color:var(--fog-dim);
  font-weight:500;
}

.or-station {
  font-size:0.75rem;
  font-weight:600;
  color:var(--snow);
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}

.or-chf {
  font-family:'JetBrains Mono',monospace;
  font-size:0.7rem;
  color:var(--fog);
  text-align:right;
  font-weight:600;
}

.dual-total {
  margin-top:12px;

.map-wrapper {

}

.map-container {
  width:100%;
  height:100%;

.resize-handle {

  color:var(--fog);
  font-family:'JetBrains Mono',monospace;
  margin-bottom:14px;
}

.map-legend {

}

.map-legend-item {
  display:flex;
  align-items:center;

  color:var(--fog);
  font-family:'JetBrains Mono',monospace;
}

.legend-dot {
  width:12px; height:12px;

}

.legend-dot.ete {

}
.legend-dot.hiver {

.popup-title {

.popup-section { margin-bottom:12px }

.popup-section-title {

.presence-together {

.marker-pin {

  font-family:'JetBrains Mono',monospace;

}

/* Couleur = saison | bordure dorée épaisse = ensemble */
.marker-pin.ete-solo {

  box-shadow:0 4px 15px rgba(5,150,105,0.45);
}
.marker-pin.hiver-solo {
  background:#2563eb;

}
.marker-pin.ete-together {
  background:#059669;

  box-shadow:0 4px 20px rgba(5,150,105,0.5), 0 0 0 2px rgba(251,191,36,0.5);
}
.marker-pin.hiver-together {
  background:#2563eb;

.marker-pin.both-solo {

}
.marker-pin.both-together {

  border:4px solid #fbbf24;
  box-shadow:0 4px 20px rgba(0,0,0,0.3), 0 0 0 2px rgba(251,191,36,0.5);

/* Aliases légende */
.marker-pin.ete { background:#059669; color:white }
.marker-pin.hiver { background:#2563eb; color:white }

.marker-pin:hover {

.marker-home {

}

/* Scrollbar */
::-webkit-scrollbar { width:8px }
::-webkit-scrollbar-track { background:var(--bg-deep) }
::-webkit-scrollbar-thumb { background:var(--border); border-radius:4px }
::-webkit-scrollbar-thumb:hover { background:var(--border-strong) }

/* Mobile */
/* =============================================
   LAYOUT PC — 1024px+, 2 colonnes
   #dashboard devient la grille principale
============================================= */
@media (min-width:1024px) {

  body { overflow:hidden; height:100vh; }

  /* Colonne gauche : scrollable */
  #pc-left {
    overflow-y:auto;
    height:100vh;
    padding:20px 18px 60px 20px;
    border-right:1px solid var(--border);
    scrollbar-width:thin;
    scrollbar-color:var(--border) transparent;
  }
  #pc-left::-webkit-scrollbar { width:5px; }
  #pc-left::-webkit-scrollbar-thumb { background:var(--border); border-radius:3px; }

  /* Colonne droite : carte fixe */
  #pc-right {
    display:flex;
    flex-direction:column;
    height:100vh;
    overflow:hidden;
    padding:16px 20px 16px 12px;
    gap:10px;
  }

  /* Nav : verticale dans colonne gauche */
  #pc-left .sticky-nav {
    position:static !important;
    flex-direction:column;
    align-items:flex-start;
    border-radius:16px;
    margin-bottom:16px;
    padding:8px;
    gap:2px;
    box-shadow:none;
    border:1px solid var(--border);
    background:var(--glass);
    backdrop-filter:none;
  }
  #pc-left .nav-btn {
    width:100%;
    border-radius:10px;
    padding:9px 14px;
    font-size:0.78rem;
    text-align:left;
  }

  /* Carte : prend toute la hauteur disponible */
  #pc-right .map-wrapper {
    flex:1;
    min-height:0;
    resize:none !important;
    width:100% !important;
    height:100% !important;
    border-radius:20px;
  }
  #pc-right .map-container { height:100% !important; }
  #pc-right #map { height:100% !important; min-height:0 !important; }

  /* Panneau info : compact sous la carte */
  #pc-right .map-info-panel {
    flex-shrink:0;
    max-height:260px;
    overflow-y:auto;
    margin-top:0;
  }

  /* Contrôles carte */
  #pc-right .map-controls {
    flex-shrink:0;
    padding:10px 14px;
    border-radius:14px;
    gap:14px;
  }

  /* Légende */
  #pc-right .map-legend {
    flex-shrink:0;
    padding:4px 2px;
    gap:12px;
  }

  /* Titre de section : plus compact */
  #pc-left .section-title { font-size:0.68rem; margin:20px 0 10px; }

}

@media (max-width:480px) {
  .header h1 { font-size:2rem }
  .person-big { font-size:2.5rem }
  .big-metric .amount { font-size:2.2rem }
  .dual-col { gap:8px }
  .dual-col-block { padding:12px 8px }
  .map-wrapper { min-height:300px }
  #map { min-height:260px }
  .leaflet-popup-content { min-width:180px }
  .control-buttons { gap:6px }
  .control-btn { padding:6px 12px; font-size:0.75rem }
}
